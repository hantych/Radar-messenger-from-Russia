name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find project
        id: detect
        shell: bash
        run: |
          ROOT=$(find . -name "pubspec.yaml" -not -path "*/node_modules/*" -not -path "*/build/*" | head -1 | xargs dirname)
          echo "Found project at: $ROOT"
          echo "root=$ROOT" >> $GITHUB_OUTPUT

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: ${{ steps.detect.outputs.root }}
        run: flutter pub get

      - name: Build release APK
        working-directory: ${{ steps.detect.outputs.root }}
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-mesh-apk
          path: ${{ steps.detect.outputs.root }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
          if-no-files-found: error
